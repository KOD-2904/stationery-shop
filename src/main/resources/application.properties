spring.application.name=Stationery_shop

frontend.base-url=${FRONTEND_BASE_URL:http://localhost:5173/}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

jwt.secret=${JWT_SECRET}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6382}
spring.cache.type=${CACHE_TYPE}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.image-width=${CLOUDINARY_WIDTH:1000}
cloudinary.image-height=${CLOUDINARY_HEIGHT:1000}

vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.payment-url=${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payment/vnpay-callback}
vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/payment/vnpay-ipn}
vnpay.version=${VNPAY_VERSION}
vnpay.command=${VNPAY_COMMAND}
vnpay.order-type=${VNPAY_ORDER_TYPE}
vnpay.currency=${VNPAY_CURRENCY}
vnpay.locale=${VNPAY_LOCALE}

checkout.expiration-scan-delay-ms=${CHECKOUT_EXPIRATION_SCAN_DELAY_MS:60000}

ghn.enabled=${GHN_ENABLED:false}
ghn.mock-enabled=${GHN_MOCK_ENABLED:false}
ghn.master-data-mock-enabled=${GHN_MASTER_DATA_MOCK_ENABLED:false}
ghn.order-mock-enabled=${GHN_ORDER_MOCK_ENABLED:false}
ghn.base-url=${GHN_BASE_URL:https://dev-online-gateway.ghn.vn}
ghn.token=${GHN_TOKEN:}
ghn.shop-id=${GHN_SHOP_ID:}
ghn.from-district-id=${GHN_FROM_DISTRICT_ID:}
ghn.from-ward-code=${GHN_FROM_WARD_CODE:}
ghn.from-name=${GHN_FROM_NAME:}
ghn.from-phone=${GHN_FROM_PHONE:}
ghn.from-address=${GHN_FROM_ADDRESS:}
ghn.default-service-type-id=${GHN_DEFAULT_SERVICE_TYPE_ID:2}
ghn.max-insurance-value=${GHN_MAX_INSURANCE_VALUE:50000}
ghn.max-cod-amount=${GHN_MAX_COD_AMOUNT:400000}
ghn.max-fee-difference=${GHN_MAX_FEE_DIFFERENCE:0}
