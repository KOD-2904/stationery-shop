spring.application.name=Stationery_shop

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

jwt.secret=${JWT_SECRET}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6382}
spring.cache.type=${CACHE_TYPE}

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.image-width=${CLOUDINARY_WIDTH:}
cloudinary.image-height=${CLOUDINARY_HEIGHT:}

vnpay.tmn-code=${VNPAY_TMN_CODE:}
vnpay.hash-secret=${VNPAY_HASH_SECRET:}
vnpay.payment-url=${VNPAY_PAYMENT_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay-return}
vnpay.ipn-url=${VNPAY_IPN_URL:http://localhost:8080/api/payments/vnpay-ipn}
vnpay.version=${VNPAY_VERSION}
vnpay.command=${VNPAY_COMMAND}
vnpay.order-type=${VNPAY_ORDER_TYPE}
vnpay.currency=${VNPAY_CURRENCY}
vnpay.locale=${VNPAY_LOCALE}

ghn.enabled=${GHN_ENABLED:false}
ghn.base-url=${GHN_BASE_URL:https://dev-online-gateway.ghn.vn}
ghn.token=${GHN_TOKEN:}
ghn.shop-id=${GHN_SHOP_ID:}
ghn.from-district-id=${GHN_FROM_DISTRICT_ID:}
ghn.from-ward-code=${GHN_FROM_WARD_CODE:}
ghn.max-fee-difference=${GHN_MAX_FEE_DIFFERENCE:0}
