services:
  mysql:
    image: mysql:8.4
    container_name: stationery-mysql
    environment:
      MYSQL_DATABASE: db_totnghiep2
      MYSQL_USER: db_totnghiep2_user
      MYSQL_PASSWORD: 29042004
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:8.4
    container_name: stationery-redis
    ports:
      - "6382:6379"

volumes:
  mysql_data:
